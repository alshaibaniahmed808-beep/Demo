<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدار الحجز - نسخة تجريبية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="logo-area">
            <h1 class="brand-name">مدار الحجز</h1>
            <span class="badge">نسخة تجريبية للعملاء</span>
        </div>
    </header>

    <main class="container">
        <div class="doctor-card">
            <div class="doctor-info">
                <h2>عيادة الأمل الطبية</h2>
                <p>د. محمد عبد الله - استشاري طب الأسنان</p>
                <p class="price">سعر الكشف: 50 دينار</p>
            </div>
        </div>

        <div class="booking-section">
            <h3>اختر موعدك المتاح:</h3>
            <p class="subtitle">تاريخ اليوم: الأحد</p>
            
            <div class="time-slots" id="time-grid">
                </div>
        </div>
    </main>

    <div id="booking-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3>تأكيد الحجز</h3>
            <p>الموعد المختار: <strong id="selected-time"></strong></p>
            
            <form id="booking-form">
                <div class="input-group">
                    <label for="patient-name">اسم المريض:</label>
                    <input type="text" id="patient-name" required placeholder="أدخل اسمك الثلاثي">
                </div>
                <div class="input-group">
                    <label for="patient-phone">رقم الهاتف:</label>
                    <input type="tel" id="patient-phone" required placeholder="09X XXX XXXX">
                </div>
                <button type="submit" class="confirm-btn">تأكيد الموعد الآن</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
